# Netlify config for paulaleech-site preview/production deploys.
#
# Astro's astro.config.mjs detects NETLIFY=true and drops the /paulaleech-site
# subdirectory used for GitHub Pages — Netlify serves at the apex, so pages
# live at /, /contact/, /press/, etc. This file just runs the standard build.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"
