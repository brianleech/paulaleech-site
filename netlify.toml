# Netlify config for paulaleech-site preview deploys
#
# Astro's astro.config.mjs sets site=brianleech.github.io and base=/paulaleech-site
# for the GitHub Pages production target. On Netlify previews we want the same
# base path so internal links work identically to local dev (which uses /paulaleech-site/).
#
# Each push to a non-main branch creates a unique preview URL like:
#   https://<branch-or-deploy-id>--paulaleech-site.netlify.app/paulaleech-site/
#
# Production builds (main branch) are also produced if you ever switch DNS,
# but for now treat Netlify as preview-only.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

# Pretty URLs: trailing slash on /contact -> /contact/index.html etc.
# Astro outputs nested index.html files by default; this matches.
[[redirects]]
  from = "/paulaleech-site/*"
  to = "/paulaleech-site/:splat"
  status = 200

# Helpful headers for the preview environment
[[headers]]
  for = "/*"
  [headers.values]
    # Don't index preview deploys
    X-Robots-Tag = "noindex, nofollow"
